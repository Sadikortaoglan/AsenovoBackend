spring:
  application:
    name: sara-asansor-api
  
  mvc:
    contentnegotiation:
      favor-path-extension: false
      favor-parameter: false
      ignore-accept-header: false
      default-content-type: application/json
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/sara_asansor}
    username: sara_asansor
    password: sara_asansor
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit_naming_strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: true  # Allow V4 to run even though V5 was applied (will be fixed by repair)
    repair-on-migrate: true
    validate-on-migrate: false  # Temporarily disable validation to allow repair to fix V5
    ignore-migration-patterns: "*:ignored"  # Ignore deleted migrations
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${SMTP_HOST:email-smtp.eu-north-1.amazonaws.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:${SES_SMTP_USERNAME:AKIAUNXJTBJ2UQCXW6OJ}}
    password: ${SMTP_PASSWORD:${SES_SMTP_PASSWORD:BK2g+tXF2d08Ig0GtQrzmRrF/PDlt9Kt+HD/rsvezG0t}}
    properties:
      mail:
        smtp:
          auth: true
          debug: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.saraasansor.api: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.orm.jdbc.bind: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

app:
  deployment-mode: SAAS # SAAS | ON_PREM

  tenancy:
    migration:
      enabled: ${TENANCY_MIGRATION_ENABLED:true}
      include-shared-schemas: ${TENANCY_MIGRATION_INCLUDE_SHARED_SCHEMAS:true}
      include-dedicated-dbs: ${TENANCY_MIGRATION_INCLUDE_DEDICATED_DBS:true}
      default-shared-schema: ${TENANCY_DEFAULT_SHARED_SCHEMA:public}
      history-table: ${TENANCY_FLYWAY_HISTORY_TABLE:flyway_schema_history}
      baseline-on-migrate: ${TENANCY_FLYWAY_BASELINE_ON_MIGRATE:true}
      connect-retries: ${TENANCY_FLYWAY_CONNECT_RETRIES:1}
      locations: classpath:db/migration

  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-change-this-local-dev-jwt-secret-change-this}
    access-token-expiration: 900000  # 15 minutes
    refresh-token-expiration: 604800000  # 7 days
  
  file-storage:
    type: ${FILE_STORAGE_TYPE:local}  # local or s3
    local:
      directory: ${FILE_STORAGE_LOCAL_DIR:./uploads}
    s3:
      endpoint: ${AWS_ENDPOINT:}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      bucket: ${AWS_BUCKET:sara-asansor-files}
      region: ${AWS_REGION:us-east-1}
  
  qr:
    secret-key: ${QR_SECRET_KEY:local-dev-qr-secret-change-this-local-dev-qr-secret-change-this}
    token-ttl-minutes: ${QR_TOKEN_TTL_MINUTES:3}  # Token expiration in minutes
    base-url: ${QR_BASE_URL:https://app.saraasansor.com}
    size: 300  # QR code image size in pixels
    session-token-ttl-minutes: ${QR_SESSION_TOKEN_TTL_MINUTES:5}  # QR session token expiration in minutes
  
  maintenance:
    min-duration-minutes: ${MAINTENANCE_MIN_DURATION_MINUTES:3}  # Minimum session duration in minutes

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${ASENOVO_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${ASENOVO_DOCS_ENABLED:true}
    try-it-out-enabled: true
    persist-authorization: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

asenovo:
  docs:
    enabled: ${ASENOVO_DOCS_ENABLED:true}
    server-url: ${ASENOVO_DOCS_SERVER_URL:http://localhost:8080/api}
    default-tenant-host: ${ASENOVO_DOCS_DEFAULT_TENANT_HOST:default.asenovo.local}
    allowed-hosts: ${ASENOVO_DOCS_ALLOWED_HOSTS:localhost,127.0.0.1,default.asenovo.local,internal-api.asenovo.local}
    tenant-options: ${ASENOVO_DOCS_TENANT_OPTIONS:default.asenovo.local,tenant1.asenovo.local,tenant2.asenovo.local}
  marketing:
    app-base-domain: ${ASENOVO_MARKETING_APP_BASE_DOMAIN:asenovo.local}
    support-email: ${ASENOVO_MARKETING_SUPPORT_EMAIL:support@asenovo.com}
    from-email: ${ASENOVO_MARKETING_FROM_EMAIL:no-reply@asenovo.com}
    trial-cleanup-grace-days: ${ASENOVO_MARKETING_TRIAL_CLEANUP_GRACE_DAYS:7}
    trial-expire-cron: ${ASENOVO_MARKETING_TRIAL_EXPIRE_CRON:0 0 4 * * *}
    trial-cleanup-cron: ${ASENOVO_MARKETING_TRIAL_CLEANUP_CRON:0 30 4 * * *}
    demo-db:
      admin-url: ${ASENOVO_MARKETING_DEMO_DB_ADMIN_URL:}
      admin-username: ${ASENOVO_MARKETING_DEMO_DB_ADMIN_USERNAME:}
      admin-password: ${ASENOVO_MARKETING_DEMO_DB_ADMIN_PASSWORD:}
      name-prefix: ${ASENOVO_MARKETING_DEMO_DB_NAME_PREFIX:asenovo_demo_}
      template-name: ${ASENOVO_MARKETING_DEMO_DB_TEMPLATE_NAME:asenovo_demo_template}
