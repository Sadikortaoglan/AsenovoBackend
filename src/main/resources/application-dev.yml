spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sara_asansor
    username: sara_asansor
    password: sara_asansor
  
  jpa:
    show-sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    # Dev: Load both schema migrations AND seed data
    locations: classpath:db/migration,classpath:db/migration/dev

# Allow seed/dummy data in development
app:
  seed:
    enabled: true
  tenancy:
    migration:
      enabled: ${TENANCY_MIGRATION_ENABLED:true}
      include-shared-schemas: ${TENANCY_MIGRATION_INCLUDE_SHARED_SCHEMAS:true}
      include-dedicated-dbs: ${TENANCY_MIGRATION_INCLUDE_DEDICATED_DBS:false}

logging:
  level:
    com.saraasansor.api: DEBUG
    org.springframework.security: DEBUG
