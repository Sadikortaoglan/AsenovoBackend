spring:
  application:
    name: sara-asansor-api
  
  mvc:
    contentnegotiation:
      favor-path-extension: false
      favor-parameter: false
      ignore-accept-header: false
      default-content-type: application/json
  
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: false  # Production: migrations must run in order (V1, V2, V3...)
    # Production: ONLY schema migrations, NO seed data
    # dev/ folder is EXCLUDED - seed data NEVER runs in production
    locations: classpath:db/migration
    # CRITICAL: Do NOT include classpath:db/migration/dev
    # This ensures seed/dummy data NEVER runs in production
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: WARN
    com.saraasansor.api: INFO
    org.springframework: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    org.apache.catalina: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/sara-asansor-api.log
    max-size: 10MB
    max-history: 30

app:
  # Production: Dummy/seed data is FORBIDDEN
  seed:
    enabled: false
  tenancy:
    migration:
      enabled: ${TENANCY_MIGRATION_ENABLED:true}
      include-shared-schemas: ${TENANCY_MIGRATION_INCLUDE_SHARED_SCHEMAS:true}
      include-dedicated-dbs: ${TENANCY_MIGRATION_INCLUDE_DEDICATED_DBS:true}
  
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000  # 15 minutes
    refresh-token-expiration: 604800000  # 7 days
  
  file-storage:
    type: ${FILE_STORAGE_TYPE:local}  # local or s3
    local:
      directory: ${FILE_STORAGE_LOCAL_DIR:/app/uploads}
    s3:
      endpoint: ${AWS_ENDPOINT:}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      bucket: ${AWS_BUCKET:sara-asansor-files}
      region: ${AWS_REGION:us-east-1}
  
  qr:
    secret-key: ${QR_SECRET_KEY}  # REQUIRED: Must be set via environment variable
    token-ttl-minutes: ${QR_TOKEN_TTL_MINUTES:3}
    base-url: ${QR_BASE_URL:http://51.21.3.85:8080}
    size: 300
    session-token-ttl-minutes: ${QR_SESSION_TOKEN_TTL_MINUTES:5}

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${ASENOVO_DOCS_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${ASENOVO_DOCS_ENABLED:false}
    try-it-out-enabled: true
    persist-authorization: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

asenovo:
  docs:
    enabled: ${ASENOVO_DOCS_ENABLED:false}
    server-url: ${ASENOVO_DOCS_SERVER_URL:https://internal-api.asenovo.com/api}
    default-tenant-host: ${ASENOVO_DOCS_DEFAULT_TENANT_HOST:default.asenovo.com}
    allowed-hosts: ${ASENOVO_DOCS_ALLOWED_HOSTS:internal-api.asenovo.com}
    tenant-options: ${ASENOVO_DOCS_TENANT_OPTIONS:default.asenovo.com,tenant1.asenovo.com,tenant2.asenovo.com}
  marketing:
    environment: ${ASENOVO_MARKETING_ENVIRONMENT:prod}
    app-base-domain: ${ASENOVO_MARKETING_APP_BASE_DOMAIN:asenovo.com}
    app-url-template: ${ASENOVO_MARKETING_APP_URL_TEMPLATE:https://{tenant}.asenovo.com/login}
    mail-enabled: ${ASENOVO_MARKETING_MAIL_ENABLED:true}
    support-email: ${ASENOVO_MARKETING_SUPPORT_EMAIL:support@asenovo.com}
    from-email: ${ASENOVO_MARKETING_FROM_EMAIL:no-reply@asenovo.com}
    trial-cleanup-grace-days: ${ASENOVO_MARKETING_TRIAL_CLEANUP_GRACE_DAYS:7}
    trial-expire-cron: ${ASENOVO_MARKETING_TRIAL_EXPIRE_CRON:0 0 4 * * *}
    trial-cleanup-cron: ${ASENOVO_MARKETING_TRIAL_CLEANUP_CRON:0 30 4 * * *}
    demo-db:
      admin-url: ${ASENOVO_MARKETING_DEMO_DB_ADMIN_URL:}
      admin-username: ${ASENOVO_MARKETING_DEMO_DB_ADMIN_USERNAME:}
      admin-password: ${ASENOVO_MARKETING_DEMO_DB_ADMIN_PASSWORD:}
      name-prefix: ${ASENOVO_MARKETING_DEMO_DB_NAME_PREFIX:asenovo_demo_}
      template-name: ${ASENOVO_MARKETING_DEMO_DB_TEMPLATE_NAME:asenovo_demo_template}
