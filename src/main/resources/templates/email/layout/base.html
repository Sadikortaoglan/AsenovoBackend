<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;padding:24px 12px;">
    <tr>
        <td align="center">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
                <tr>
                    <td style="background:#0f766e;padding:22px 28px;color:#ffffff;">
                        <div style="font-size:22px;font-weight:700;letter-spacing:.2px;">Asenovo</div>
                        <div style="font-size:13px;opacity:.9;margin-top:4px;">Asansor takip ve operasyon yonetimi</div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:28px;">
                        {{content}}
                    </td>
                </tr>
                <tr>
                    <td style="padding:20px 28px;background:#f9fafb;border-top:1px solid #e5e7eb;color:#6b7280;font-size:12px;line-height:1.6;">
                        <div>{{footerNote}}</div>
                        <div>Destek: <a href="mailto:{{supportEmail}}" style="color:#0f766e;text-decoration:none;">{{supportEmail}}</a></div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
